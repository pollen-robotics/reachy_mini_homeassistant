blueprint:
  name: "Reachy Mini: Notify when robot wakes up"
  description: >
    Fires the configured actions every time the Reachy Mini transitions
    from sleeping to awake. The robot is considered "awake" whenever
    its motors are enabled or in gravity compensation.


    **Requires** the `binary_sensor.reachy_mini_awake` entity created
    by the Reachy Mini `rest:` block — see
    https://github.com/pollen-robotics/reachy_mini_homeassistant
  domain: automation
  author: Pollen Robotics
  source_url: https://github.com/pollen-robotics/reachy_mini_homeassistant/blob/main/blueprints/automation/reachy_mini/notify_on_wake.yaml
  input:
    awake_entity:
      name: "Reachy Mini Awake binary sensor"
      description: >
        The binary_sensor created by the REST block. Defaults to the
        entity name from the blueprint copy-paste YAML.
      default: binary_sensor.reachy_mini_awake
      selector:
        entity:
          domain: binary_sensor
    motor_mode_entity:
      name: "(Optional) Motor mode sensor"
      description: >
        If supplied, the motor mode is exposed as `motor_mode` in
        the actions sequence below.
      default: sensor.reachy_mini_motor_mode
      selector:
        entity:
          domain: sensor
    actions:
      name: "Actions"
      description: >
        Run every time the robot wakes. Typical pick: a `notify.*`
        service or a `light.turn_on`.
      selector:
        action: {}

mode: single

variables:
  motor_mode_entity: !input motor_mode_entity
  motor_mode: "{{ states(motor_mode_entity) if motor_mode_entity else 'unknown' }}"

trigger:
  - platform: state
    entity_id: !input awake_entity
    from: "off"
    to: "on"

action: !input actions
